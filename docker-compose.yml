name: bingo

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bingo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bingo}
      POSTGRES_DB: ${POSTGRES_DB:-bingo}
    volumes:
      - bingo_db_data:/var/lib/postgresql/data
    networks:
      - app_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bingo} -d ${POSTGRES_DB:-bingo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bingo}:${POSTGRES_PASSWORD:-bingo}@db:5432/${POSTGRES_DB:-bingo}
    networks:
      - app_internal
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "[db-init] applying schema (drizzle-kit push)"
        bunx drizzle-kit push --force

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      # Tell SvelteKit's adapter-node what its public origin is — fixes 403
      # CSRF rejections when the Host header doesn't match the browser-facing URL.
      ORIGIN: ${BETTER_AUTH_URL}
      DATABASE_URL: postgres://${POSTGRES_USER:-bingo}:${POSTGRES_PASSWORD:-bingo}@db:5432/${POSTGRES_DB:-bingo}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_ADMIN_ROLE_ID: ${DISCORD_ADMIN_ROLE_ID}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    networks:
      - app_internal

networks:
  app_internal:

volumes:
  bingo_db_data:
